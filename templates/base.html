<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Modelos Expertos{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style type="text/tailwindcss">
    @layer base {
      input[type=text], input[type=number], input[type=email], select {
        @apply w-full border border-slate-300 rounded-lg px-3 py-2 text-sm bg-white
               focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent;
      }
      input[type=checkbox] {
        @apply w-4 h-4 rounded border-slate-300 text-indigo-600 cursor-pointer;
      }
      label { @apply text-sm font-medium text-slate-700; }
    }
  </style>
</head>
<body class="h-full bg-slate-100 flex">

  <!-- ── Sidebar ── -->
  <aside class="w-56 min-h-screen bg-slate-900 text-slate-100 flex flex-col flex-shrink-0">

    <div class="px-5 py-5 border-b border-slate-700">
      <p class="text-xs uppercase tracking-widest text-slate-500 font-semibold">UNTELS · IA</p>
      <h1 class="text-sm font-bold mt-0.5 text-white">Modelos Expertos</h1>
    </div>

    <nav class="flex-1 px-3 py-4 space-y-1 text-sm">

      <!-- Modelo Neuronal -->
      <a href="{% url 'predict' %}"
         class="flex items-center gap-2.5 px-3 py-2 rounded-lg transition-colors
                {% if request.path == '/accidentes/' %}bg-indigo-600 text-white font-medium
                {% else %}text-slate-300 hover:bg-slate-700 hover:text-white{% endif %}">
        <span class="text-base leading-none">✈</span>
        <span>Modelo Neuronal</span>
      </a>

      <!-- Insuficiencia Cardíaca (grupo) -->
      <div>
        <a href="{% url 'medical_index' %}"
           class="flex items-center gap-2.5 px-3 py-2 rounded-lg transition-colors
                  {% if request.path == '/insuficiencia-cardiaca/' %}bg-rose-600 text-white font-medium
                  {% else %}text-slate-300 hover:bg-slate-700 hover:text-white{% endif %}">
          <span class="text-base leading-none">♥</span>
          <span>Insuf. Cardíaca</span>
        </a>

        <!-- Sub-links -->
        <div class="ml-5 mt-1 border-l border-slate-700 pl-3 space-y-1">
          <a href="{% url 'medical_tree' %}"
             class="flex items-center gap-2 px-2 py-1.5 rounded-md transition-colors text-xs
                    {% if request.path == '/insuficiencia-cardiaca/arbol/' %}bg-rose-600 text-white font-medium
                    {% else %}text-slate-400 hover:bg-slate-700 hover:text-white{% endif %}">
            Árbol de Decisión
          </a>
          <a href="{% url 'medical_diagnosis' %}"
             class="flex items-center gap-2 px-2 py-1.5 rounded-md transition-colors text-xs
                    {% if request.path == '/insuficiencia-cardiaca/diagnostico/' %}bg-rose-600 text-white font-medium
                    {% else %}text-slate-400 hover:bg-slate-700 hover:text-white{% endif %}">
            Diagnóstico
          </a>
        </div>
      </div>

    </nav>

    <div class="px-5 py-4 border-t border-slate-700">
      <p class="text-xs text-slate-500">Django · SWI-Prolog · TensorFlow</p>
    </div>
  </aside>

  <!-- ── Contenido principal ── -->
  <main class="flex-1 overflow-auto">
    <div class="max-w-6xl mx-auto px-6 py-8">
      {% block content %}{% endblock %}
    </div>
  </main>

</body>
</html>
